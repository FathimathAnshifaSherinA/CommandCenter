<template>
  <lightning-card title="Billing — SAP" icon-name="standard:bill">
    <div class="slds-p-around_medium">

      <div class="slds-box slds-theme_shade slds-m-bottom_medium">
        <div class="slds-grid slds-grid_vertical-align-center">
          <div class="slds-grow">
            <p class="slds-text-heading_small">{invoiceNumber}</p>
            <p class="slds-text-body_small slds-text-color_weak">
              SAP Billing System
            </p>
          </div>
          <lightning-badge label={billingStatus} class={billingBadgeClass}>
          </lightning-badge>
        </div>
      </div>

      <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-box slds-box_x-small slds-text-align_center">
            <p class="slds-text-body_small slds-text-color_weak">Amount (USD)</p>
            <p class="slds-text-heading_medium slds-text-color_error">
              {totalDueUSD}
            </p>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-box slds-box_x-small slds-text-align_center">
            <p class="slds-text-body_small slds-text-color_weak">Amount (INR)</p>
            <p class="slds-text-heading_medium slds-text-color_error">
              {totalDueINR}
            </p>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-m-top_small">
          <div class="slds-box slds-box_x-small slds-text-align_center">
            <p class="slds-text-body_small slds-text-color_weak">Account</p>
            <p class="slds-text-heading_small">{accountName}</p>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2 slds-m-top_small">
          <div class="slds-box slds-box_x-small slds-text-align_center">
            <p class="slds-text-body_small slds-text-color_weak">Due Date</p>
            <p class="slds-text-heading_small">{dueDate}</p>
          </div>
        </div>
      </div>

      <!-- Live exchange rate banner -->
      <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_small">
        <p class="slds-text-body_small slds-text-align_center">
          <lightning-icon icon-name="utility:money" size="xx-small"
            class="slds-m-right_xx-small">
          </lightning-icon>
          {exchangeRate} &nbsp;·&nbsp; {rateSource}
        </p>
      </div>
      <!-- SAP Line Item Detail -->
        <div class="slds-box slds-box_x-small slds-theme_shade slds-m-bottom_small">
        <p class="slds-text-body_small slds-text-color_weak">
            Material
        </p>
        <p class="slds-text-body_regular">{materialDesc}</p>
        <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
            Quantity: {quantity} &nbsp;·&nbsp; Company: {companyCode}
        </p>
        </div>

      <div class="slds-m-bottom_small">
        <p class="slds-text-body_small slds-text-color_weak">
          Last shipment linked: {lastTracking}
        </p>
      </div>

      <template lwc:if={hasInventoryWarning}>
        <div class="slds-notify slds-notify_alert slds-theme_warning
                    slds-m-bottom_small" role="alert">
          <lightning-icon icon-name="utility:warning" size="xx-small"
            class="slds-m-right_x-small">
          </lightning-icon>
          {inventoryWarning}
        </div>
      </template>

      <template lwc:if={lastRefreshedAt}>
        <p class="slds-text-body_small slds-text-color_weak
                   slds-border_top slds-p-top_x-small">
          Last refreshed: {lastRefreshedAt}
        </p>
      </template>

    </div>
  </lightning-card>
</template>
