name: CI/CD Quality Pipeline

on:
  pull_request:
    branches:
      - main
      - uat
  push:
    branches:
      - uat
      - main

jobs:

  static-analysis:
    name: PMD Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Cache PMD
        id: cache-pmd
        uses: actions/cache@v4
        with:
          path: pmd
          key: pmd-7.23.0

      - name: Download PMD
        if: steps.cache-pmd.outputs.cache-hit != "true"
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.23.0/pmd-dist-7.23.0-bin.zip
          unzip pmd-dist-7.23.0-bin.zip
          mv pmd-bin-7.23.0 pmd

      - name: Run PMD scan
        run: |
          pmd/bin/pmd check             --dir force-app/main/default/classes             --rulesets config/pmd-ruleset.xml             --format text             --minimum-priority 3             --fail-on-violation

  apex-tests:
    name: Apex Tests and Coverage Check
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Dev Sandbox
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_DEV }}" > auth-file.txt
          sf org login sfdx-url --sfdx-url-file auth-file.txt --alias dev-sandbox

      - name: Run Apex tests
        run: |
          sf apex run test             --target-org dev-sandbox             --test-level RunAllTestsInOrg             --code-coverage             --result-format json             --output-dir test-results             --wait 30

      - name: Enforce 85 percent coverage
        run: |
          python3 << EOF
          import json, sys
          with open("test-results/test-result.json") as f:
              data = json.load(f)
          coverage = data["result"]["summary"]["testRunCoverage"]
          pct = float(coverage.replace("%", ""))
          print(f"Coverage: {pct}%")
          if pct < 85:
              print(f"BLOCKED: {pct}% is below 85%")
              sys.exit(1)
          print("Coverage check passed")
          EOF
